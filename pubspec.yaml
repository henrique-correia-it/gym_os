name: gym_os
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  google_sign_in: ^6.3.0
  googleapis: ^13.1.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12 # Essencial para ligar os dois

  # Conectividade e API
  http: ^1.6.0
  connectivity_plus: ^6.0.0

  flutter:
    sdk: flutter

  flutter_localizations: # Adiciona esta linha
    sdk: flutter
  # State Management (Core apenas)
  flutter_riverpod: ^2.4.9

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # UI & Utils
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.5
  intl: ^0.20.2
  fl_chart: ^0.70.2 # Adiciona esta linha
  pdf: ^3.11.0
  printing: ^5.11.0
  share_plus: ^12.0.1
  file_picker: ^10.3.10
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  flutter_svg: ^2.2.3
  image_picker: ^1.1.2
  google_mlkit_barcode_scanning: ^0.12.1
  google_mlkit_text_recognition: ^0.13.1
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

  # Apenas o isar_generator e build_runner ficam
  build_runner: ^2.4.8
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/data/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
